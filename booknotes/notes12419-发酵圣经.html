<div class="mycomment">
<p>中文版分成了两本书，相比于作者之前写的那本 Wild Fermentation，这本书不再是罗列食谱的方式，读起来更加有趣了一些。之前那本只讲素食发酵，这一本涵盖的发酵范围大大扩展了。</p>
<p>在图书馆借到了纸质版的中文书，读的过程中在英文版的电子书上划了线，同时在《我的餐馆经验总结》中做了大量的笔记。</p>
</div>
